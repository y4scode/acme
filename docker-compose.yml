services:
  database:
    image: postgres:16
    container_name: acme_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: acme_database
      POSTGRES_USER: acme_user
      POSTGRES_PASSWORD: acme_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acme_user -d acme_database"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  postgres_data: